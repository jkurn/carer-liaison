name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --verbose --coverage --coverageReporters=text-summary 2>&1

      - name: Check for test failures
        if: failure()
        run: echo "::error::Tests failed. Fix before merging."
