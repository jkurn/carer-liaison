<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Carer Liaison</title>
  <meta name="description" content="Carer Liaison dashboard — health monitoring, daily plans, and service discovery for carers and NDIS participants.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── APP LAYOUT ── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-card);
      border-right: 1px solid var(--border-light);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }
    .sidebar-brand {
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-brand a {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--teal);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .sidebar-nav {
      flex: 1;
      padding: var(--sp-4) var(--sp-3);
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-sm);
      text-decoration: none;
      color: var(--warm-gray);
      font-size: 0.9rem;
      font-weight: 400;
      transition: all 0.15s ease;
    }
    .sidebar-link:hover {
      background: var(--bg-surface);
      color: var(--dark);
    }
    .sidebar-link.active {
      background: var(--teal-mist);
      color: var(--teal);
      font-weight: 500;
    }
    .sidebar-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .sidebar-link.active svg { opacity: 1; }

    .sidebar-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: var(--sp-4) var(--sp-4) var(--sp-2);
    }

    .sidebar-footer {
      padding: var(--sp-4) var(--sp-4);
      border-top: 1px solid var(--border-light);
    }
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2);
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar-user:hover { background: var(--bg-surface); }
    .sidebar-user-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--dark);
    }
    .sidebar-user-role {
      font-size: 0.72rem;
      color: var(--mid-gray);
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      padding: var(--sp-4) var(--sp-6);
    }
    .topbar-inner {
      max-width: var(--max-width);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      color: var(--dark);
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
      background: none;
      border: none;
      padding: var(--sp-2);
      cursor: pointer;
      color: var(--warm-gray);
    }

    /* ── VIEW CONTAINER ── */
    #app {
      padding: var(--sp-6);
      max-width: var(--max-width);
    }

    /* ── VIEW TRANSITION ── */
    .view-enter {
      animation: viewIn 0.25s ease forwards;
    }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .main-content {
        margin-left: 0;
      }
      .sidebar-toggle {
        display: flex;
      }
      #app {
        padding: var(--sp-4);
      }
    }
  </style>
</head>
<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="#/">Carer Liaison</a>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Overview</div>
      <a href="#/" class="sidebar-link" data-route="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>

      <div class="sidebar-section-label">Health</div>
      <a href="#/body-state" class="sidebar-link" data-route="/body-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        Body State
      </a>

      <div class="sidebar-section-label">Services</div>
      <a href="#/services" class="sidebar-link" data-route="/services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Find Services
      </a>

      <div class="sidebar-section-label">Account</div>
      <a href="#/settings" class="sidebar-link" data-route="/settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser">
        <div class="avatar avatar-sm">CL</div>
        <div>
          <div class="sidebar-user-name" id="userName">Carer</div>
          <div class="sidebar-user-role">Primary carer</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="row gap-3">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" id="quickLog">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Log Body State
          </button>
        </div>
      </div>
    </header>

    <div id="app" class="view-enter">
      <!-- Views render here -->
    </div>
  </main>

</div>

<!-- GSAP (CDN, all free) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- App modules -->
<script type="module" src="router.js"></script>

<script>
  // Sidebar toggle (mobile)
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  toggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });

  // Close sidebar on outside click (mobile)
  document.addEventListener('click', (e) => {
    if (sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) &&
        !toggle.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  });
</script>

</body>
</html>
