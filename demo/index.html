<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carer Journal — Carer Liaison Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #008080;
      --teal-dark: #006666;
      --teal-light: #00a0a0;
      --teal-pale: #e6f5f5;
      --teal-mist: #f0fafa;
      --dark: #1a1a1a;
      --warm-gray: #4a4a48;
      --mid-gray: #6b6b68;
      --light-gray: #e8e8e6;
      --off-white: #f8f8f6;
      --white: #ffffff;
      --rose: #e84393;
      --rose-bg: #fdf2f8;
      --rose-border: #f9a8d4;
      --bud: #00b894;
      --bud-bg: #ecfdf5;
      --bud-border: #6ee7b7;
      --thorn: #e17055;
      --thorn-bg: #fef3ee;
      --thorn-border: #fdba74;
      --entity-blue: #3b82f6;
      --entity-purple: #8b5cf6;
      --entity-amber: #f59e0b;
      --entity-green: #10b981;
      --entity-pink: #ec4899;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: var(--sans);
      background: var(--off-white);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--light-gray);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { font-family: var(--serif); font-size: 20px; color: var(--teal); text-decoration: none; }
    .nav-badge {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--teal); background: var(--teal-pale); padding: 4px 10px; border-radius: 999px;
    }

    /* Main */
    .main {
      flex: 1; max-width: 680px; width: 100%; margin: 0 auto; padding: 0 24px 48px;
    }

    /* Chat area */
    .chat { padding-top: 32px; }
    .message {
      display: flex; gap: 12px; margin-bottom: 24px;
      animation: fadeUp 0.3s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .avatar-ai { background: var(--teal); color: white; }
    .avatar-user { background: var(--light-gray); color: var(--warm-gray); }
    .bubble {
      padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.55;
      max-width: 520px;
    }
    .bubble-ai {
      background: var(--white); border: 1px solid var(--light-gray);
      border-top-left-radius: 4px;
    }
    .bubble-user {
      background: var(--teal); color: white;
      border-top-right-radius: 4px; margin-left: auto;
    }
    .message-user { flex-direction: row-reverse; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; padding: 8px 0; }
    .typing span {
      width: 7px; height: 7px; background: var(--mid-gray); border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      position: sticky; bottom: 0;
      background: var(--off-white);
      padding: 16px 0 24px;
      border-top: 1px solid var(--light-gray);
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-wrap {
      flex: 1; position: relative;
    }
    textarea.journal-input {
      width: 100%; min-height: 52px; max-height: 160px;
      padding: 14px 16px; font-family: var(--sans); font-size: 15px; line-height: 1.4;
      color: var(--dark); background: var(--white);
      border: 1.5px solid var(--light-gray); border-radius: var(--r-xl);
      resize: none; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea.journal-input:focus {
      border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,128,128,0.1);
    }
    textarea.journal-input::placeholder { color: #b0b0ae; }
    .btn-send {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--teal); border: none; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s; flex-shrink: 0;
    }
    .btn-send:hover:not(:disabled) { background: var(--teal-dark); }
    .btn-send:active:not(:disabled) { transform: scale(0.94); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { width: 20px; height: 20px; }

    /* Prompt chips */
    .prompts {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .prompt-chip {
      font-family: var(--sans); font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid var(--light-gray); background: var(--white);
      color: var(--warm-gray); cursor: pointer; transition: all 0.15s;
    }
    .prompt-chip:hover {
      border-color: var(--teal-light); background: var(--teal-mist); color: var(--teal-dark);
    }

    /* ───────── Rosebud Cards ───────── */
    .rosebud-section {
      margin-top: 8px; margin-bottom: 24px;
      animation: fadeUp 0.4s ease-out;
    }
    .rosebud-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; padding-left: 48px;
    }
    .rosebud-header-icon { font-size: 14px; }
    .rosebud-header-text {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--teal);
    }

    .rosebud-cards {
      display: flex; flex-direction: column; gap: 10px;
      padding-left: 48px;
    }
    .rbt-card {
      padding: 14px 16px; border-radius: var(--r-lg);
      border-left: 3px solid; font-size: 14px; line-height: 1.5;
    }
    .rbt-card-header {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 6px; font-weight: 600; font-size: 13px;
    }
    .rbt-card-body { color: var(--warm-gray); }

    .rbt-rose { background: var(--rose-bg); border-color: var(--rose); }
    .rbt-rose .rbt-card-header { color: var(--rose); }
    .rbt-bud { background: var(--bud-bg); border-color: var(--bud); }
    .rbt-bud .rbt-card-header { color: var(--bud); }
    .rbt-thorn { background: var(--thorn-bg); border-color: var(--thorn); }
    .rbt-thorn .rbt-card-header { color: var(--thorn); }

    /* ───────── Entity Extraction ───────── */
    .entities-section {
      margin-bottom: 24px; padding-left: 48px;
      animation: fadeUp 0.4s ease-out 0.15s both;
    }
    .entities-header {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--mid-gray); margin-bottom: 10px;
    }
    .entity-groups {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .entity-group {
      display: flex; flex-direction: column; gap: 4px;
    }
    .entity-group-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--mid-gray);
    }
    .entity-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .entity-tag {
      font-size: 12px; font-weight: 500; padding: 3px 10px;
      border-radius: 999px; border: 1px solid;
    }
    .tag-people { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .tag-emotion { background: #fdf2f8; border-color: #f9a8d4; color: #be185d; }
    .tag-service { background: #ecfdf5; border-color: #6ee7b7; color: #047857; }
    .tag-action { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .tag-ndis { background: #f5f3ff; border-color: #c4b5fd; color: #5b21b6; }

    /* ───────── Insights Panel ───────── */
    .insights-panel {
      margin-bottom: 24px; padding-left: 48px;
      animation: fadeUp 0.4s ease-out 0.3s both;
    }
    .insight-card {
      background: var(--white); border: 1px solid var(--light-gray);
      border-radius: var(--r-lg); padding: 16px; box-shadow: var(--shadow-sm);
    }
    .insight-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .insight-row + .insight-row { border-top: 1px solid var(--light-gray); }
    .insight-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .insight-label { font-size: 12px; color: var(--mid-gray); }
    .insight-value { font-size: 14px; font-weight: 600; color: var(--dark); }

    /* API key */
    .setup-banner {
      background: var(--teal-mist); border: 1.5px solid var(--teal-pale);
      border-radius: var(--r-lg); padding: 16px 20px; margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .setup-banner h3 { font-size: 14px; font-weight: 600; color: var(--teal-dark); }
    .setup-banner p { font-size: 13px; color: var(--warm-gray); line-height: 1.4; }
    .setup-banner a { color: var(--teal); }
    .key-row { display: flex; gap: 8px; }
    .key-input {
      flex: 1; font-family: var(--sans); font-size: 13px;
      padding: 10px 14px; border: 1.5px solid var(--light-gray);
      border-radius: var(--r-md); outline: none;
    }
    .key-input:focus { border-color: var(--teal); }
    .key-save {
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      padding: 10px 16px; background: var(--teal); color: white;
      border: none; border-radius: var(--r-md); cursor: pointer;
    }
    .setup-banner.hidden { display: none; }

    /* Footer */
    .footer { text-align: center; padding: 16px; font-size: 12px; color: var(--mid-gray); }
    .footer a { color: var(--teal); text-decoration: none; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark); color: white; padding: 10px 20px;
      border-radius: var(--r-md); font-size: 13px; font-weight: 500;
      opacity: 0; transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .main { padding: 0 16px 32px; }
      .rosebud-cards, .rosebud-header, .entities-section, .insights-panel { padding-left: 0; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">Carer Liaison</a>
    <span class="nav-badge">AI Journal</span>
  </nav>

  <main class="main">
    <!-- API Key Setup -->
    <div class="setup-banner" id="setupBanner" style="margin-top:24px">
      <h3>Connect your Gemini API key to start</h3>
      <p>Get a free key from <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> (30 seconds). Your key stays in your browser.</p>
      <div class="key-row">
        <input type="password" class="key-input" id="apiKeyInput" placeholder="Paste your Gemini API key...">
        <button class="key-save" id="saveKeyBtn">Save</button>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Input -->
    <div class="input-area" id="inputArea">
      <div class="input-row">
        <div class="input-wrap">
          <textarea class="journal-input" id="journalInput" rows="1"
            placeholder="Tell me about your day..."></textarea>
        </div>
        <button class="btn-send" id="sendBtn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <div class="prompts" id="prompts">
        <button class="prompt-chip" data-text="It was such a long day. Tom had a meltdown at school pickup and I had to carry him to the car while everyone stared. Then his OT cancelled last minute. I managed to get him to eat dinner though which felt like a win.">Hard day at school pickup</button>
        <button class="prompt-chip" data-text="Actually today was pretty good. Tom's teacher said he sat through circle time for the first time in weeks. I even had 20 minutes to myself while he played independently. Small wins but I'll take them.">Small wins today</button>
        <button class="prompt-chip" data-text="I'm so frustrated with the NDIA. They rejected our plan review request saying there's no change in circumstances. But Tom clearly needs more speech therapy — his therapist Sarah wrote a letter supporting it. I don't know what to do next.">NDIA frustration</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Built by <a href="https://carerliaison.com">Carer Liaison</a>. Your journal stays private.</p>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // ───────── CONFIG ─────────
    const GEMINI_MODEL = 'gemini-2.0-flash';
    const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

    // ───────── ELEMENTS ─────────
    const $ = id => document.getElementById(id);
    const chat = $('chat');
    const journalInput = $('journalInput');
    const sendBtn = $('sendBtn');
    const setupBanner = $('setupBanner');
    const apiKeyInput = $('apiKeyInput');
    const saveKeyBtn = $('saveKeyBtn');
    const prompts = $('prompts');
    const toast = $('toast');

    // ───────── STATE ─────────
    let apiKey = localStorage.getItem('gemini_api_key') || '';
    let conversationHistory = [];
    let isStreaming = false;
    let messageCount = 0;

    // ───────── INIT ─────────
    if (apiKey) setupBanner.classList.add('hidden');
    addAIMessage("Hey there. I'm here whenever you're ready.\n\nHow was your day?");
    updateSendBtn();

    // ───────── API KEY ─────────
    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) return;
      apiKey = key;
      localStorage.setItem('gemini_api_key', key);
      setupBanner.classList.add('hidden');
      updateSendBtn();
      journalInput.focus();
    });

    // ───────── INPUT ─────────
    journalInput.addEventListener('input', () => {
      journalInput.style.height = 'auto';
      journalInput.style.height = Math.min(journalInput.scrollHeight, 160) + 'px';
      updateSendBtn();
    });
    journalInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    function updateSendBtn() {
      sendBtn.disabled = !journalInput.value.trim() || !apiKey || isStreaming;
    }

    // ───────── PROMPT CHIPS ─────────
    prompts.addEventListener('click', e => {
      const chip = e.target.closest('.prompt-chip');
      if (!chip) return;
      journalInput.value = chip.dataset.text;
      journalInput.style.height = 'auto';
      journalInput.style.height = Math.min(journalInput.scrollHeight, 160) + 'px';
      updateSendBtn();
      journalInput.focus();
    });

    // ───────── SEND ─────────
    sendBtn.addEventListener('click', handleSend);

    async function handleSend() {
      const text = journalInput.value.trim();
      if (!text || !apiKey || isStreaming) return;

      // Add user message
      addUserMessage(text);
      journalInput.value = '';
      journalInput.style.height = 'auto';
      messageCount++;

      // Hide prompts after first message
      prompts.style.display = 'none';

      // Show typing
      const typingEl = addTypingIndicator();
      isStreaming = true;
      updateSendBtn();

      // Add to history
      conversationHistory.push({ role: 'user', parts: [{ text }] });

      try {
        // First: get the empathetic response (streamed)
        const responseText = await streamResponse(text, typingEl);

        // Remove typing, show AI response
        typingEl.remove();
        addAIMessage(responseText);
        conversationHistory.push({ role: 'model', parts: [{ text: responseText }] });

        // Then: extract rosebud + entities (non-streamed, parallel)
        const extractionData = await extractRosebudAndEntities(text);
        if (extractionData) {
          renderRosebud(extractionData);
          renderEntities(extractionData);
          renderInsights(extractionData);
        }

      } catch (err) {
        typingEl.remove();
        addAIMessage("I'm sorry, something went wrong. Can you try again?");
        console.error(err);
      } finally {
        isStreaming = false;
        updateSendBtn();
        journalInput.focus();
      }
    }

    // ───────── SYSTEM PROMPTS ─────────
    function getConversationSystemPrompt() {
      return `You are a compassionate, experienced carer support companion for Carer Liaison — an Australian app for unpaid carers of people with disabilities (especially NDIS participants).

Your personality:
- Warm, grounded, and real — like a trusted friend who also happens to understand NDIS inside out
- You validate emotions first, always. Never jump to solutions.
- You notice the small wins the carer might overlook
- You speak like a real person, not a therapist or chatbot. Australian English.
- Short responses (2-4 sentences max). No bullet points. No lists. Just human conversation.
- Ask gentle follow-up questions to keep the conversation going
- If they mention something hard, acknowledge it specifically before anything else
- Never say "I understand" — show understanding through specificity

You are NOT a therapist, not a crisis line, not giving medical advice. You're a knowledgeable mate who gets it.

This is message ${messageCount + 1} in today's journal conversation.`;
    }

    function getExtractionPrompt(journalText) {
      return `Analyze this carer's journal entry and extract structured data. Return ONLY valid JSON, no markdown, no explanation.

Journal entry:
"${journalText}"

Return this exact JSON structure:
{
  "rose": {
    "title": "short 3-5 word title of what went well",
    "body": "1-2 sentence description of the positive moment"
  },
  "bud": {
    "title": "short 3-5 word title of what's emerging",
    "body": "1-2 sentence description of opportunity or development"
  },
  "thorn": {
    "title": "short 3-5 word title of what was hard",
    "body": "1-2 sentence description of the challenge"
  },
  "entities": {
    "people": ["names or roles mentioned, e.g. Tom, Ms Chen, OT therapist"],
    "emotions": ["specific emotions detected, e.g. frustrated, proud, exhausted"],
    "services": ["NDIS services or providers mentioned, e.g. OT, speech therapy, NDIA"],
    "actions": ["potential next steps implied, e.g. Call OT to reschedule, Follow up on plan review"],
    "ndis_terms": ["NDIS-specific terms used, e.g. plan review, core supports, capacity building"]
  },
  "mood_score": 65,
  "energy_label": "Running on fumes",
  "carer_load": "High"
}

Rules:
- mood_score: 0-100 (0 = crisis, 100 = thriving)
- energy_label: one of "Thriving", "Steady", "Stretched thin", "Running on fumes", "At breaking point"
- carer_load: one of "Light", "Moderate", "High", "Overwhelming"
- If no rose/bud/thorn can be extracted, still provide your best interpretation
- People array should include relationship context if clear (e.g. "Tom (son)")
- Actions should be specific and actionable
- Return ONLY the JSON object, nothing else`;
    }

    // ───────── STREAMING RESPONSE ─────────
    async function streamResponse(userText, typingEl) {
      const url = `${API_BASE}/${GEMINI_MODEL}:streamGenerateContent?key=${apiKey}&alt=sse`;

      const messages = [
        ...conversationHistory.slice(-6), // keep last 3 exchanges for context
        { role: 'user', parts: [{ text: userText }] }
      ];

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: getConversationSystemPrompt() }] },
          contents: messages,
          generationConfig: { temperature: 0.85, maxOutputTokens: 300 }
        })
      });

      if (!response.ok) throw new Error(`API error ${response.status}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let buffer = '';

      // Replace typing indicator with streaming bubble
      typingEl.remove();
      const streamMsg = addAIMessage('', true);
      const bubbleEl = streamMsg.querySelector('.bubble');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const text = parsed?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) {
              fullText += text;
              bubbleEl.innerHTML = escapeHtml(fullText) + '<span class="cursor-blink"></span>';
            }
          } catch (e) {}
        }
      }

      bubbleEl.innerHTML = escapeHtml(fullText);
      return fullText;
    }

    // ───────── EXTRACTION (non-streamed) ─────────
    async function extractRosebudAndEntities(journalText) {
      const url = `${API_BASE}/${GEMINI_MODEL}:generateContent?key=${apiKey}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ role: 'user', parts: [{ text: getExtractionPrompt(journalText) }] }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 800 }
          })
        });

        if (!response.ok) return null;
        const data = await response.json();
        let text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

        // Clean markdown code fences if present
        text = text.replace(/^```json?\s*/i, '').replace(/\s*```$/i, '').trim();

        return JSON.parse(text);
      } catch (e) {
        console.error('Extraction failed:', e);
        return null;
      }
    }

    // ───────── RENDER FUNCTIONS ─────────
    function addAIMessage(text, isStreaming = false) {
      const div = document.createElement('div');
      div.className = 'message message-ai';
      div.innerHTML = `
        <div class="avatar avatar-ai">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <div class="bubble bubble-ai">${text ? escapeHtml(text) : (isStreaming ? '<span class="cursor-blink"></span>' : '')}</div>
      `;
      chat.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message message-user';
      div.innerHTML = `
        <div class="bubble bubble-user">${escapeHtml(text)}</div>
        <div class="avatar avatar-user">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      `;
      chat.appendChild(div);
      scrollToBottom();
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message message-ai';
      div.innerHTML = `
        <div class="avatar avatar-ai">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <div class="bubble bubble-ai"><div class="typing"><span></span><span></span><span></span></div></div>
      `;
      chat.appendChild(div);
      scrollToBottom();
      return div;
    }

    function renderRosebud(data) {
      if (!data.rose && !data.bud && !data.thorn) return;

      const section = document.createElement('div');
      section.className = 'rosebud-section';
      section.innerHTML = `
        <div class="rosebud-header">
          <span class="rosebud-header-icon">🌱</span>
          <span class="rosebud-header-text">Today's Rosebud</span>
        </div>
        <div class="rosebud-cards">
          ${data.rose ? `
          <div class="rbt-card rbt-rose">
            <div class="rbt-card-header">🌹 Rose — ${esc(data.rose.title)}</div>
            <div class="rbt-card-body">${esc(data.rose.body)}</div>
          </div>` : ''}
          ${data.bud ? `
          <div class="rbt-card rbt-bud">
            <div class="rbt-card-header">🌱 Bud — ${esc(data.bud.title)}</div>
            <div class="rbt-card-body">${esc(data.bud.body)}</div>
          </div>` : ''}
          ${data.thorn ? `
          <div class="rbt-card rbt-thorn">
            <div class="rbt-card-header">🥀 Thorn — ${esc(data.thorn.title)}</div>
            <div class="rbt-card-body">${esc(data.thorn.body)}</div>
          </div>` : ''}
        </div>
      `;
      chat.appendChild(section);
      scrollToBottom();
    }

    function renderEntities(data) {
      if (!data.entities) return;
      const e = data.entities;
      const hasAny = (e.people?.length || e.emotions?.length || e.services?.length || e.actions?.length || e.ndis_terms?.length);
      if (!hasAny) return;

      const section = document.createElement('div');
      section.className = 'entities-section';

      let html = '<div class="entities-header">Extracted from your entry</div><div class="entity-tags">';

      const tagMap = [
        ['people', 'tag-people', '👤'],
        ['emotions', 'tag-emotion', '💭'],
        ['services', 'tag-service', '🏥'],
        ['actions', 'tag-action', '⚡'],
        ['ndis_terms', 'tag-ndis', '📋']
      ];

      for (const [key, cls, icon] of tagMap) {
        if (e[key]?.length) {
          for (const item of e[key]) {
            html += `<span class="entity-tag ${cls}">${icon} ${esc(item)}</span>`;
          }
        }
      }

      html += '</div>';
      section.innerHTML = html;
      chat.appendChild(section);
      scrollToBottom();
    }

    function renderInsights(data) {
      if (!data.mood_score && !data.energy_label && !data.carer_load) return;

      const moodColor = data.mood_score >= 70 ? 'var(--bud)' :
                         data.mood_score >= 40 ? 'var(--entity-amber)' : 'var(--thorn)';

      const section = document.createElement('div');
      section.className = 'insights-panel';
      section.innerHTML = `
        <div class="insight-card">
          <div class="insight-row">
            <div class="insight-icon" style="background:${moodColor}15; color:${moodColor}">
              ${data.mood_score >= 70 ? '😊' : data.mood_score >= 40 ? '😐' : '😔'}
            </div>
            <div>
              <div class="insight-label">Mood</div>
              <div class="insight-value" style="color:${moodColor}">${data.mood_score}/100</div>
            </div>
          </div>
          <div class="insight-row">
            <div class="insight-icon" style="background: var(--teal-pale); color: var(--teal);">⚡</div>
            <div>
              <div class="insight-label">Energy</div>
              <div class="insight-value">${esc(data.energy_label || 'Unknown')}</div>
            </div>
          </div>
          <div class="insight-row">
            <div class="insight-icon" style="background: #f5f3ff; color: var(--entity-purple);">📊</div>
            <div>
              <div class="insight-label">Carer Load</div>
              <div class="insight-value">${esc(data.carer_load || 'Unknown')}</div>
            </div>
          </div>
        </div>
      `;
      chat.appendChild(section);
      scrollToBottom();
    }

    // ───────── HELPERS ─────────
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }
    const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>

  <style>
    .cursor-blink {
      display: inline-block; width: 2px; height: 1em;
      background: var(--teal); animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom; margin-left: 1px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</body>
</html>
