<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Carer Liaison — Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .prototype-wrapper {
    display: flex; flex-direction: column; height: 100%; max-width: 500px; margin: 0 auto;
  }

  .header {
    padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    background: #16213e; border-bottom: 1px solid #0f3460;
  }
  .header h1 { color: #e2e8f0; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  .screen-counter { color: #94a3b8; font-size: 13px; font-weight: 500; }

  .phone-frame {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 16px; position: relative; overflow: hidden;
  }

  .screen-container {
    position: relative; width: 100%; max-width: 393px; aspect-ratio: 393 / 852;
    border-radius: 40px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    background: #f9fafb; touch-action: pan-y;
  }

  .screen-slide {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
    will-change: transform, opacity;
  }
  .screen-slide img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    -webkit-user-drag: none; user-select: none; pointer-events: none;
  }
  .screen-slide.active { transform: translateX(0); opacity: 1; }
  .screen-slide.left { transform: translateX(-100%); opacity: 0.3; }
  .screen-slide.right { transform: translateX(100%); opacity: 0.3; }
  .screen-slide.hidden { display: none; }

  .screen-slide.dragging { transition: none; }

  .nav-bar {
    padding: 12px 20px 16px; display: flex; gap: 8px; align-items: center;
    background: #16213e; border-top: 1px solid #0f3460;
  }
  .nav-btn {
    width: 44px; height: 44px; border-radius: 12px; border: 1px solid #0f3460;
    background: #1a1a2e; color: #e2e8f0; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-btn:hover { background: #0f3460; border-color: #0891b2; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: #1a1a2e; border-color: #0f3460; }

  .screen-name {
    flex: 1; color: #cbd5e1; font-size: 12px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .progress-bar {
    display: flex; gap: 3px; padding: 0 20px 8px; background: #16213e;
  }
  .progress-dot {
    flex: 1; height: 3px; border-radius: 2px; background: #0f3460;
    transition: background 0.3s;
  }
  .progress-dot.active { background: #0891b2; }
  .progress-dot.visited { background: #0891b260; }

  .swipe-hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 12px; opacity: 0;
    animation: fadeHint 3s ease 1s forwards;
    pointer-events: none;
  }
  @keyframes fadeHint {
    0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; }
  }

  @media (max-width: 430px) {
    .screen-container { border-radius: 0; max-width: 100%; }
    .phone-frame { padding: 0; }
  }
</style>
</head>
<body>

<div class="prototype-wrapper">
  <div class="header">
    <h1>CARER LIAISON</h1>
    <span class="screen-counter" id="counter">1 / 26</span>
  </div>

  <div class="phone-frame">
    <div class="screen-container" id="screenContainer">
      <div class="swipe-hint">← Swipe to navigate →</div>
    </div>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="screen-name" id="screenName">1. Onboarding</div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>
</div>

<script>
const screens = [
  { id: "VAE5t", name: "1. Onboarding" },
  { id: "FXIaQ", name: "2. Home Dashboard" },
  { id: "V233w", name: "3. My Day (Context)" },
  { id: "qLkBF", name: "4. Participant Profile" },
  { id: "Nio3V", name: "5. Body State Tracker" },
  { id: "EZKi1", name: "6. Daily Log" },
  { id: "KY4wL", name: "7. Journal Chat" },
  { id: "fXCUe", name: "8. Journal Entry (Rosebud)" },
  { id: "BnORF", name: "9. Journal Feed" },
  { id: "fIghF", name: "10. Journal Insights" },
  { id: "ucBrj", name: "11. Goals Tracker" },
  { id: "AWNyq", name: "12. Care Plan View" },
  { id: "PUQiA", name: "13. Budget & Funding" },
  { id: "MVTIX", name: "14. Carer Wellness" },
  { id: "w957d", name: "15. Team & Communication" },
  { id: "jn5yI", name: "16. Incidents & Alerts" },
  { id: "hHBXF", name: "17. Crisis Mode" },
  { id: "7mRF3", name: "18. Service Search" },
  { id: "wdfy3", name: "19. Document Generator" },
  { id: "1Zqp2", name: "20. Plan Review Prep" },
  { id: "GW8gn", name: "21. Settings & Account" },
  { id: "OZeSd", name: "22. Notifications Center" },
  { id: "ABbwF", name: "23. Shift Handover" },
  { id: "zJsPh", name: "24. Medication Tracker" },
  { id: "QaY9R", name: "25. Appointment Schedule" },
  { id: "2BMbh", name: "26. Evidence & Photo Capture" }
];

let current = 0;
let visited = new Set([0]);
const container = document.getElementById('screenContainer');
const progressBar = document.getElementById('progressBar');

// Create slides
screens.forEach((s, i) => {
  const slide = document.createElement('div');
  slide.className = 'screen-slide ' + (i === 0 ? 'active' : 'hidden');
  slide.dataset.index = i;
  const img = document.createElement('img');
  img.src = `screens/${s.id}.png`;
  img.alt = s.name;
  img.loading = i < 3 ? 'eager' : 'lazy';
  slide.appendChild(img);
  container.appendChild(slide);
});

// Create progress dots
screens.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dot.style.cursor = 'pointer';
  progressBar.appendChild(dot);
});

function updateUI() {
  document.getElementById('counter').textContent = `${current + 1} / ${screens.length}`;
  document.getElementById('screenName').textContent = screens[current].name;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === screens.length - 1;

  document.querySelectorAll('.progress-dot').forEach((d, i) => {
    d.className = 'progress-dot' + (i === current ? ' active' : visited.has(i) ? ' visited' : '');
  });
}

function goTo(index) {
  if (index < 0 || index >= screens.length || index === current) return;
  const dir = index > current ? 1 : -1;
  const oldSlide = container.querySelector(`.screen-slide[data-index="${current}"]`);
  const newSlide = container.querySelector(`.screen-slide[data-index="${index}"]`);

  oldSlide.className = 'screen-slide ' + (dir > 0 ? 'left' : 'right');
  newSlide.className = 'screen-slide right';
  if (dir > 0) newSlide.style.transform = 'translateX(100%)';
  else newSlide.style.transform = 'translateX(-100%)';
  newSlide.style.opacity = '0.3';

  requestAnimationFrame(() => {
    newSlide.className = 'screen-slide active';
    newSlide.style.transform = '';
    newSlide.style.opacity = '';
  });

  setTimeout(() => { oldSlide.className = 'screen-slide hidden'; }, 400);

  current = index;
  visited.add(current);
  updateUI();
}

function navigate(dir) { goTo(current + dir); }

// Touch/swipe handling
let startX = 0, startY = 0, deltaX = 0, swiping = false;
const THRESHOLD = 50;

container.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  deltaX = 0;
  swiping = false;
}, { passive: true });

container.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) swiping = true;
  if (swiping) {
    deltaX = dx;
    const slide = container.querySelector('.screen-slide.active');
    if (slide) {
      slide.classList.add('dragging');
      slide.style.transform = `translateX(${deltaX}px)`;
    }
  }
}, { passive: true });

container.addEventListener('touchend', () => {
  const slide = container.querySelector('.screen-slide.active');
  if (slide) {
    slide.classList.remove('dragging');
    slide.style.transform = '';
  }
  if (swiping) {
    if (deltaX < -THRESHOLD) navigate(1);
    else if (deltaX > THRESHOLD) navigate(-1);
  }
  swiping = false;
  deltaX = 0;
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Mouse drag support (for desktop)
let mouseDown = false, mouseStartX = 0;
container.addEventListener('mousedown', e => {
  mouseDown = true;
  mouseStartX = e.clientX;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - mouseStartX;
  const slide = container.querySelector('.screen-slide.active');
  if (slide) {
    slide.classList.add('dragging');
    slide.style.transform = `translateX(${dx}px)`;
  }
});
document.addEventListener('mouseup', e => {
  if (!mouseDown) return;
  const dx = e.clientX - mouseStartX;
  const slide = container.querySelector('.screen-slide.active');
  if (slide) {
    slide.classList.remove('dragging');
    slide.style.transform = '';
  }
  if (Math.abs(dx) > THRESHOLD) {
    if (dx < 0) navigate(1);
    else navigate(-1);
  }
  mouseDown = false;
});

updateUI();
</script>
</body>
</html>
